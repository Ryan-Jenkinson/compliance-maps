<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Library — Tunvara</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL = "https://oramnktatlppjjzhtiat.supabase.co";
    window.SUPABASE_ANON_KEY = "sb_publishable_-HbSii9IjY1ZqDM5eIvZjQ_WNUzVaoI";
  </script>
  <script src="static/js/auth.js"></script>
  <script src="static/js/favorites.js"></script>
  <script src="static/js/notifications.js"></script>
  <script src="static/js/comments.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #161b26; --border: #232b3a;
      --text-primary: #e2e8f0; --text-secondary: #8b95a7; --text-muted: #4a5568;
      --accent: #d64045; --hover: rgba(255,255,255,0.04);
      --mono: 'IBM Plex Mono', monospace; --sans: 'Instrument Sans', sans-serif;
      --green: #38a169; --red: #d64045; --amber: #F59E0B;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text-primary); font-family: var(--sans); min-height: 100vh; }

    /* Page header */
    .page-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 11px 20px; display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 100;
    }
    .page-header a { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; letter-spacing: 1px; }
    .page-header a:hover { color: var(--text-secondary); }
    .ph-title { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--text-primary); letter-spacing: 2px; }
    .ph-upload-btn {
      margin-left: auto; font-family: var(--mono); font-size: 11px; font-weight: 600;
      letter-spacing: 1px; background: var(--accent); color: #fff; border: none;
      border-radius: 4px; padding: 6px 14px; cursor: pointer;
    }
    .ph-upload-btn:hover { opacity: 0.9; }

    /* Layout */
    .lib-layout { display: flex; min-height: calc(100vh - 43px); }

    /* Sidebar */
    .lib-sidebar {
      width: 200px; flex-shrink: 0; border-right: 1px solid var(--border);
      background: var(--surface); padding: 18px 0;
    }
    .sidebar-section { padding: 0 10px; margin-bottom: 14px; }
    .sidebar-lbl { font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; padding: 0 4px; margin-bottom: 6px; }
    .folder-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 8px; margin: 1px 0; border-radius: 4px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); user-select: none;
    }
    .folder-link:hover { background: var(--hover); color: var(--text-primary); }
    .folder-link.active { background: rgba(214,64,69,0.1); color: var(--text-primary); }
    .folder-count { font-family: var(--mono); font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .folder-sub { padding-left: 20px; font-size: 12px; }
    .new-folder-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 1px; padding: 4px 8px; margin-top: 4px;
    }
    .new-folder-btn:hover { color: var(--text-secondary); }

    /* Main */
    .lib-main { flex: 1; padding: 20px 24px; overflow: auto; min-width: 0; }
    .lib-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .lib-search {
      flex: 1; max-width: 320px; padding: 8px 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 5px;
      color: var(--text-primary); font-size: 13px; font-family: var(--sans);
    }
    .lib-search:focus { outline: none; border-color: var(--accent); }
    .lib-count { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

    /* Empty state */
    .lib-empty { padding: 60px 20px; text-align: center; color: var(--text-muted); }
    .lib-empty p { font-size: 14px; margin-bottom: 6px; }
    .lib-empty small { font-size: 12px; }

    /* Document grid */
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

    /* Document card */
    .doc-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .doc-card-body { padding: 14px 16px 10px; }
    .doc-type-icon { font-size: 24px; margin-bottom: 8px; display: block; }
    .doc-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; line-height: 1.4; word-break: break-word; }
    .doc-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); line-height: 1.6; }
    .doc-folder-tag { display: inline-block; margin-top: 5px; font-size: 10px; font-family: var(--mono); color: var(--accent); background: rgba(214,64,69,0.08); border-radius: 3px; padding: 1px 6px; }
    .doc-actions { display: flex; align-items: center; gap: 3px; padding: 8px 10px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.12); flex-wrap: wrap; }
    .doc-action-btn {
      font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
      background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text-muted);
      padding: 3px 7px; cursor: pointer; white-space: nowrap;
    }
    .doc-action-btn:hover { background: var(--hover); color: var(--text-primary); border-color: var(--text-muted); }
    .doc-action-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .doc-action-btn.ct-active { background: rgba(214,64,69,0.1); color: var(--text-primary); border-color: var(--accent); }

    /* Comment thread styles (mirrors dashboard.css) */
    .comment-thread { padding: 12px 16px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.2); }
    .ct-list { margin-bottom: 10px; }
    .ct-comment { margin-bottom: 10px; }
    .ct-reply { margin-left: 16px; margin-top: 6px; padding-left: 10px; border-left: 2px solid var(--border); }
    .ct-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ct-author { font-family: var(--mono); font-weight: 600; color: var(--text-secondary); }
    .ct-time { font-family: var(--mono); }
    .ct-edited { font-style: italic; font-size: 10px; }
    .ct-body { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
    .ct-deleted { color: var(--text-muted); font-style: italic; }
    .ct-act { background: none; border: none; cursor: pointer; font-family: var(--mono); font-size: 10px; color: var(--text-muted); padding: 0 4px; letter-spacing: 0.5px; }
    .ct-act:hover { color: var(--text-secondary); }
    .ct-replybox { margin-top: 6px; }
    .ct-compose { margin-top: 10px; }
    .ct-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 4px; color: var(--text-primary); padding: 6px 10px; font-size: 12px; font-family: var(--sans); resize: none; }
    .ct-input:focus { outline: none; border-color: var(--accent); }
    .ct-post { margin-top: 5px; background: var(--accent); color: #fff; border: none; border-radius: 3px; padding: 4px 12px; cursor: pointer; font-size: 11px; font-family: var(--mono); font-weight: 600; letter-spacing: 1px; }
    .ct-msg { font-size: 12px; color: var(--text-muted); padding: 4px 0; }
    .ct-error { color: var(--red); }
    .ct-count { font-family: var(--mono); font-size: 10px; }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 5000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; width: 460px; max-width: calc(100vw - 40px); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .modal-title { font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--text-primary); text-transform: uppercase; }
    .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 17px; line-height: 1; padding: 0; }
    .modal-close:hover { color: var(--text-primary); }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; font-family: var(--mono); letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; }
    .form-input { width: 100%; padding: 8px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text-primary); font-size: 13px; font-family: var(--sans); }
    .form-input:focus { outline: none; border-color: var(--accent); }
    select.form-input { cursor: pointer; }
    .file-drop { border: 2px dashed var(--border); border-radius: 7px; padding: 22px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
    .file-drop:hover, .file-drop.drag-over { border-color: var(--accent); }
    .file-drop-label { font-size: 13px; color: var(--text-muted); }
    .file-drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .file-selected-name { font-size: 12px; color: var(--green); margin-top: 6px; display: none; }
    input[type=file] { display: none; }
    .modal-submit-btn { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--sans); margin-top: 4px; }
    .modal-submit-btn:hover { opacity: 0.9; }
    .modal-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .modal-status { margin-top: 10px; padding: 8px 12px; border-radius: 5px; font-size: 12px; display: none; }
    .modal-status.ok { background: rgba(56,161,105,0.1); border: 1px solid var(--green); color: var(--green); }
    .modal-status.err { background: rgba(214,64,69,0.1); border: 1px solid var(--red); color: var(--red); }
  </style>
</head>
<body>

<div id="auth-overlay" style="position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="text-align:center;color:var(--text-muted);font-family:var(--mono);font-size:13px;">Checking access…</div>
</div>

<div class="page-header">
  <a href="dashboard.html">← Dashboard</a>
  <span class="ph-title">DOCUMENT LIBRARY</span>
  <button class="ph-upload-btn" onclick="openDocUploadModal()">⬆ Upload</button>
</div>

<div class="lib-layout">
  <!-- ── Sidebar ───────────────────────────────────────────────── -->
  <div class="lib-sidebar">
    <div id="lib-folder-nav">
      <div style="padding:0 14px;color:var(--text-muted);font-size:12px;font-family:var(--mono);">Loading…</div>
    </div>
  </div>

  <!-- ── Main area ─────────────────────────────────────────────── -->
  <div class="lib-main">
    <div class="lib-toolbar">
      <input id="lib-search" class="lib-search" type="search" placeholder="Search documents…" oninput="filterDocs(this.value)">
      <span class="lib-count" id="lib-count"></span>
    </div>
    <div id="lib-grid">
      <div class="lib-empty"><p>Loading…</p></div>
    </div>
  </div>
</div>

<!-- ═══ UPLOAD MODAL ═══ -->
<div class="modal-overlay" id="doc-upload-modal" onclick="if(event.target===this)closeDocUploadModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Upload Document</span>
      <button class="modal-close" onclick="closeDocUploadModal()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label class="form-label">File</label>
      <div class="file-drop" id="doc-drop-zone"
           onclick="document.getElementById('doc-file-input').click()"
           ondragover="handleDocDragOver(event)" ondragleave="handleDocDragLeave()" ondrop="handleDocDrop(event)">
        <div class="file-drop-label">Drop a file here or click to browse</div>
        <div class="file-drop-sub">PDF, Word, Excel, PowerPoint, text — max 50 MB</div>
        <input type="file" id="doc-file-input" accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.ppt,.pptx,.txt" onchange="handleDocFileSelect(event)">
      </div>
      <div class="file-selected-name" id="doc-file-name"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Title <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
      <input type="text" id="doc-upload-title" class="form-input" placeholder="Descriptive title">
    </div>
    <div class="form-group">
      <label class="form-label">Folder <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
      <select id="doc-upload-folder" class="form-input">
        <option value="">No folder</option>
      </select>
    </div>
    <button class="modal-submit-btn" id="doc-upload-btn" onclick="submitDocUpload()">Upload</button>
    <div class="modal-status" id="doc-upload-status"></div>
  </div>
</div>

<!-- ═══ MOVE TO FOLDER MODAL ═══ -->
<div id="move-modal" onclick="if(event.target===this)closeMoveModal()"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:5000;align-items:center;justify-content:center;">
  <div onclick="event.stopPropagation()"
       style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:300px;max-width:calc(100vw - 40px);">
    <div style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--text-muted);margin-bottom:12px;text-transform:uppercase;">Move to Folder</div>
    <select id="move-folder-sel" class="form-input" style="margin-bottom:14px;"></select>
    <div style="display:flex;gap:8px;">
      <button onclick="confirmMove()" style="flex:1;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">Move</button>
      <button onclick="closeMoveModal()" style="padding:8px 14px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text-secondary);cursor:pointer;font-size:13px;">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var _sb, _me;
var _libDocs = [];
var _libFolders = [];
var _currentFolderId = null; // null = All
var _selectedFile = null;
var _moveDocId = null;

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  const urlParams = new URLSearchParams(window.location.search);
  const focusId = urlParams.get('id');

  const result = await checkAuth();
  if (!result) return;
  _sb = getClient();
  _me = getProfile();
  document.getElementById('auth-overlay').style.display = 'none';

  initComments(_sb, result.session.user);
  initNotifications(_sb, _me.id);

  await loadLibrary();

  if (focusId) {
    setTimeout(() => {
      const el = document.getElementById('doc-' + focusId);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const btn = el.querySelector('.comment-btn');
        if (btn) toggleCommentThread(btn);
      }
    }, 400);
  }
})();

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadLibrary() {
  const [folderRes, docRes] = await Promise.all([
    _sb.from('article_folders').select('id,name,parent_id').eq('user_id', _me.id).order('name'),
    _sb.from('user_documents').select('*').eq('user_id', _me.id).order('uploaded_at', { ascending: false }),
  ]);
  _libFolders = folderRes.data || [];
  _libDocs = docRes.data || [];
  renderFolderNav();
  renderDocGrid(getFilteredDocs(''));
}

// ── Folder nav ────────────────────────────────────────────────────────────────
function renderFolderNav() {
  const container = document.getElementById('lib-folder-nav');
  const allCount = _libDocs.length;
  let html = '<div class="sidebar-section"><div class="sidebar-lbl">Library</div>';

  html += `<div class="folder-link${_currentFolderId === null ? ' active' : ''}" onclick="setFolder(null)">`
        + `<span>All Documents</span><span class="folder-count">${allCount}</span></div>`;

  const tops = _libFolders.filter(f => !f.parent_id);
  tops.forEach(f => {
    const subs = _libFolders.filter(s => s.parent_id === f.id);
    const cnt = _libDocs.filter(d => d.folder_id === f.id || subs.some(s => s.id === d.folder_id)).length;
    html += `<div class="folder-link${_currentFolderId === f.id ? ' active' : ''}" onclick="setFolder('${_ea(f.id)}')">`
          + `<span>\uD83D\uDCC1 ${_e(f.name)}</span><span class="folder-count">${cnt||''}</span></div>`;
    subs.forEach(s => {
      const sc = _libDocs.filter(d => d.folder_id === s.id).length;
      html += `<div class="folder-link folder-sub${_currentFolderId === s.id ? ' active' : ''}" onclick="setFolder('${_ea(s.id)}')">`
            + `<span>\uD83D\uDCC1 ${_e(s.name)}</span><span class="folder-count">${sc||''}</span></div>`;
    });
  });

  const unfiledCount = _libDocs.filter(d => !d.folder_id).length;
  if (unfiledCount > 0) {
    html += `<div class="folder-link${_currentFolderId === 'unfiled' ? ' active' : ''}" onclick="setFolder('unfiled')">`
          + `<span>\uD83D\uDCC4 Unfiled</span><span class="folder-count">${unfiledCount}</span></div>`;
  }

  html += '</div><div style="padding:0 10px;"><button class="new-folder-btn" onclick="createLibFolder()">+ New Folder</button></div>';
  container.innerHTML = html;
}

function setFolder(id) {
  _currentFolderId = id;
  renderFolderNav();
  filterDocs(document.getElementById('lib-search').value);
}

async function createLibFolder() {
  const name = prompt('Folder name:');
  if (!name || !name.trim()) return;
  const { data, error } = await _sb.from('article_folders').insert({ user_id: _me.id, name: name.trim() }).select().single();
  if (!error && data) {
    _libFolders.push(data);
    _libFolders.sort((a, b) => a.name.localeCompare(b.name));
    renderFolderNav();
  }
}

// ── Document grid ─────────────────────────────────────────────────────────────
function getFilteredDocs(q) {
  let docs = _libDocs;
  if (_currentFolderId === 'unfiled') {
    docs = docs.filter(d => !d.folder_id);
  } else if (_currentFolderId) {
    const subIds = _libFolders.filter(f => f.parent_id === _currentFolderId).map(f => f.id);
    docs = docs.filter(d => d.folder_id === _currentFolderId || subIds.includes(d.folder_id));
  }
  if (q) {
    const ql = q.toLowerCase();
    docs = docs.filter(d => (d.title || d.filename || '').toLowerCase().includes(ql));
  }
  return docs;
}

function filterDocs(q) {
  renderDocGrid(getFilteredDocs(q));
}

function renderDocGrid(docs) {
  const grid = document.getElementById('lib-grid');
  const cnt = document.getElementById('lib-count');
  cnt.textContent = docs.length + ' document' + (docs.length !== 1 ? 's' : '');

  if (!docs.length) {
    const msg = !_libDocs.length
      ? 'No documents yet. Click ⬆ Upload to add your first document.'
      : (_currentFolderId ? 'No documents in this folder.' : 'No documents match your search.');
    grid.innerHTML = `<div class="lib-empty"><p>${msg}</p></div>`;
    return;
  }
  grid.innerHTML = '<div class="doc-grid">' + docs.map(docCardHtml).join('') + '</div>';
}

function docCardHtml(doc) {
  const ext = (doc.filename || '').split('.').pop().toLowerCase();
  const icon = _fileIcon(ext);
  const size = doc.file_size ? _fmtSize(doc.file_size) : '';
  const age = _ago(doc.uploaded_at);
  const folder = doc.folder_id ? _libFolders.find(f => f.id === doc.folder_id) : null;
  const docUrl = 'documents.html?id=' + encodeURIComponent(doc.id);
  const title = doc.title || doc.filename;
  const safeId = _ea(doc.id);
  const safeStorage = _ea(doc.storage_path);
  const safeTitle = _ea(title);

  return `<div class="doc-item" id="doc-${safeId}">
    <div class="doc-card-body">
      <span class="doc-type-icon">${icon}</span>
      <div class="doc-title">${_e(title)}</div>
      <div class="doc-meta">${_e(doc.filename)}${size ? ' \xb7 ' + size : ''}${age ? ' \xb7 ' + age : ''}</div>
      ${folder ? `<span class="doc-folder-tag">\uD83D\uDCC1 ${_e(folder.name)}</span>` : ''}
    </div>
    <div class="doc-actions">
      <button class="doc-action-btn" onclick="downloadDoc('${safeId}','${safeStorage}')">&#x2193; Open</button>
      <button class="doc-action-btn send-btn" onclick='openSendPanel(${JSON.stringify(docUrl)},${JSON.stringify(title)},this)'>&#x2709; Send</button>
      <button class="doc-action-btn comment-btn"
              data-url="${_e(docUrl)}" data-title="${_e(title)}" data-type="document"
              title="Comments">
        &#x1F4AC; <span class="ct-count" style="display:none"></span>
      </button>
      <button class="doc-action-btn" onclick="openMoveModal('${safeId}')">&#x1F5C2; Move</button>
      <button class="doc-action-btn danger" onclick="deleteDoc('${safeId}','${safeStorage}','${safeTitle}')">&#x2715;</button>
    </div>
    <div class="comment-thread" style="display:none">
      <div class="ct-list"></div>
      <div class="ct-compose">
        <textarea class="ct-input" placeholder="Add a comment\u2026 (Ctrl+Enter to post)" rows="2"></textarea>
        <button class="ct-post">Post</button>
      </div>
    </div>
  </div>`;
}

// ── Download ──────────────────────────────────────────────────────────────────
async function downloadDoc(docId, storagePath) {
  const { data, error } = await _sb.storage.from('user-documents').createSignedUrl(storagePath, 300);
  if (error) { alert('Could not get download link: ' + error.message); return; }
  window.open(data.signedUrl, '_blank');
}

// ── Delete ────────────────────────────────────────────────────────────────────
async function deleteDoc(docId, storagePath, title) {
  if (!confirm('Delete \u201c' + title + '\u201d? This cannot be undone.')) return;
  await _sb.storage.from('user-documents').remove([storagePath]);
  const { error } = await _sb.from('user_documents').delete().eq('id', docId);
  if (error) { alert('Delete failed: ' + error.message); return; }
  _libDocs = _libDocs.filter(d => d.id !== docId);
  renderFolderNav();
  filterDocs(document.getElementById('lib-search').value);
}

// ── Move to folder ────────────────────────────────────────────────────────────
function openMoveModal(docId) {
  _moveDocId = docId;
  const doc = _libDocs.find(d => d.id === docId);
  const sel = document.getElementById('move-folder-sel');
  sel.innerHTML = '<option value="">No folder (Unfiled)</option>';
  _libFolders.filter(f => !f.parent_id).forEach(f => {
    const sel2 = doc && doc.folder_id === f.id ? ' selected' : '';
    sel.innerHTML += `<option value="${_ea(f.id)}"${sel2}>${_e(f.name)}</option>`;
    _libFolders.filter(s => s.parent_id === f.id).forEach(s => {
      const ss = doc && doc.folder_id === s.id ? ' selected' : '';
      sel.innerHTML += `<option value="${_ea(s.id)}"${ss}>\u00a0\u00a0${_e(f.name)} / ${_e(s.name)}</option>`;
    });
  });
  document.getElementById('move-modal').style.display = 'flex';
}

function closeMoveModal() {
  document.getElementById('move-modal').style.display = 'none';
  _moveDocId = null;
}

async function confirmMove() {
  if (!_moveDocId) return;
  const folderId = document.getElementById('move-folder-sel').value || null;
  const { error } = await _sb.from('user_documents').update({ folder_id: folderId }).eq('id', _moveDocId);
  if (error) { alert('Move failed: ' + error.message); return; }
  const doc = _libDocs.find(d => d.id === _moveDocId);
  if (doc) doc.folder_id = folderId;
  closeMoveModal();
  renderFolderNav();
  filterDocs(document.getElementById('lib-search').value);
}

// ── Upload modal ──────────────────────────────────────────────────────────────
function openDocUploadModal() {
  const sel = document.getElementById('doc-upload-folder');
  sel.innerHTML = '<option value="">No folder</option>';
  _libFolders.filter(f => !f.parent_id).forEach(f => {
    sel.innerHTML += `<option value="${_ea(f.id)}">${_e(f.name)}</option>`;
    _libFolders.filter(s => s.parent_id === f.id).forEach(s => {
      sel.innerHTML += `<option value="${_ea(s.id)}">\u00a0\u00a0${_e(f.name)} / ${_e(s.name)}</option>`;
    });
  });
  document.getElementById('doc-upload-modal').classList.add('open');
  document.getElementById('doc-upload-title').value = '';
  document.getElementById('doc-file-name').style.display = 'none';
  document.getElementById('doc-file-input').value = '';
  document.getElementById('doc-upload-status').style.display = 'none';
  _selectedFile = null;
}

function closeDocUploadModal() {
  document.getElementById('doc-upload-modal').classList.remove('open');
  _selectedFile = null;
}

function handleDocFileSelect(e) {
  _selectedFile = e.target.files[0];
  if (_selectedFile) _showDocFileName(_selectedFile.name);
}
function handleDocDragOver(e) { e.preventDefault(); document.getElementById('doc-drop-zone').classList.add('drag-over'); }
function handleDocDragLeave() { document.getElementById('doc-drop-zone').classList.remove('drag-over'); }
function handleDocDrop(e) {
  e.preventDefault(); document.getElementById('doc-drop-zone').classList.remove('drag-over');
  _selectedFile = e.dataTransfer.files[0];
  if (_selectedFile) _showDocFileName(_selectedFile.name);
}
function _showDocFileName(name) {
  const el = document.getElementById('doc-file-name');
  el.textContent = '\u2713 ' + name; el.style.display = 'block';
}

async function submitDocUpload() {
  if (!_selectedFile) { _setUploadStatus('Please select a file.', false); return; }
  if (_selectedFile.size > 50 * 1024 * 1024) { _setUploadStatus('File too large \u2014 max 50 MB.', false); return; }
  const title = document.getElementById('doc-upload-title').value.trim() || _selectedFile.name;
  const folderId = document.getElementById('doc-upload-folder').value || null;
  const btn = document.getElementById('doc-upload-btn');
  btn.disabled = true; btn.textContent = 'Uploading\u2026';

  const ext = _selectedFile.name.split('.').pop().toLowerCase();
  const path = `${_me.id}/${Date.now()}.${ext}`;
  const { error: upErr } = await _sb.storage.from('user-documents').upload(path, _selectedFile);
  if (upErr) { btn.disabled = false; btn.textContent = 'Upload'; _setUploadStatus('Upload failed: ' + upErr.message, false); return; }

  const { data: newDoc, error: dbErr } = await _sb.from('user_documents').insert({
    user_id: _me.id, storage_path: path, filename: _selectedFile.name,
    title, folder_id: folderId, file_size: _selectedFile.size, mime_type: _selectedFile.type || null,
  }).select().single();
  btn.disabled = false; btn.textContent = 'Upload';
  if (dbErr) { _setUploadStatus('Save failed: ' + dbErr.message, false); return; }

  if (newDoc) { _libDocs.unshift(newDoc); }
  _setUploadStatus('Uploaded successfully!', true);
  setTimeout(() => {
    closeDocUploadModal();
    renderFolderNav();
    filterDocs(document.getElementById('lib-search').value);
  }, 1200);
}

function _setUploadStatus(msg, ok) {
  const el = document.getElementById('doc-upload-status');
  el.textContent = msg;
  el.className = 'modal-status ' + (ok ? 'ok' : 'err');
  el.style.display = 'block';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function _fileIcon(ext) {
  const m = { pdf: '\uD83D\uDCC4', doc: '\uD83D\uDCDD', docx: '\uD83D\uDCDD', xls: '\uD83D\uDCCA', xlsx: '\uD83D\uDCCA', csv: '\uD83D\uDCCA', ppt: '\uD83D\uDCCA', pptx: '\uD83D\uDCCA', txt: '\uD83D\uDCC3' };
  return m[ext] || '\uD83D\uDCCE';
}
function _fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}
function _ago(iso) {
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1) return 'just now'; if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h/24); if (d < 30) return d + 'd ago';
  return new Date(iso).toLocaleDateString();
}
function _e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function _ea(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
</script>
